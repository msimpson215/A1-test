<style>
:root{--yellow:#F5C518;--black:#0A0A0A;--dark:#111111;--gray:#1E1E1E;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:#fff;font-family:'Barlow',sans-serif;overflow-x:hidden;}




.nav-links a:hover,.nav-links a.active{color:var(--yellow);}


.page-header{padding:140px 40px 80px;background:var(--dark);position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:url('Sams-Club-Parking-Lot-Painting-980x429.jpg') center/cover no-repeat;filter:brightness(0.22);z-index:0;}
.page-header .inner{position:relative;z-index:1;max-width:1200px;margin:0 auto;}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:0.72rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--yellow);margin-bottom:16px;}
.section-label::before{content:'';width:28px;height:2px;background:var(--yellow);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,8vw,7rem);line-height:0.95;color:#fff;}
.page-title span{color:var(--yellow);}
.page-sub{margin-top:20px;color:rgba(255,255,255,0.65);font-size:1rem;max-width:480px;line-height:1.6;}
.feature-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;height:480px;}
.feature-card{position:relative;overflow:hidden;cursor:pointer;}
.feature-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s ease;filter:contrast(1.08) brightness(0.88);}
.feature-card:hover img{transform:scale(1.05);}
.feature-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0) 55%);z-index:1;}
.feature-info{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:28px;}
.feature-tag{display:inline-block;background:var(--yellow);color:var(--black);font-size:0.65rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;padding:5px 12px;margin-bottom:10px;}
.feature-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;color:#fff;}
.feature-loc{font-size:0.82rem;color:rgba(255,255,255,0.55);margin-top:6px;}
.filter-bar{background:#0d0d0d;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:76px;z-index:90;}
.filter-inner{padding:0 40px;display:flex;gap:0;overflow-x:auto;}
.filter-btn{background:none;border:none;color:rgba(255,255,255,0.4);padding:20px 28px;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:color 0.2s;border-bottom:3px solid transparent;white-space:nowrap;margin-bottom:-1px;}
.filter-btn:hover{color:rgba(255,255,255,0.8);}
.filter-btn.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.gallery-section{padding:48px 40px 96px;}
.count-bar{max-width:1200px;margin:0 auto 28px;display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.06);}
.count-text{font-size:0.8rem;color:rgba(255,255,255,0.35);letter-spacing:0.06em;}
.count-text span{color:var(--yellow);font-weight:800;}
.gallery-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.photo-card{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:#1a1a1a;}
.photo-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease;filter:contrast(1.06) brightness(0.9) saturate(1.05);}
.photo-card:hover img{transform:scale(1.08);}
.photo-card::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,0) 35%,rgba(0,0,0,0.6) 100%);z-index:1;transition:opacity 0.3s;}
.photo-card::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.72);z-index:2;opacity:0;transition:opacity 0.3s;}
.photo-card:hover::before{opacity:0;}
.photo-card:hover::after{opacity:1;}
.photo-info{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:20px 18px;transform:translateY(6px);opacity:0;transition:opacity 0.3s,transform 0.3s;}
.photo-card:hover .photo-info{opacity:1;transform:translateY(0);}
.photo-tag{display:inline-block;background:var(--yellow);color:var(--black);font-size:0.62rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;padding:4px 9px;margin-bottom:7px;}
.photo-title{font-weight:800;font-size:0.95rem;color:#fff;line-height:1.3;}
.photo-loc{font-size:0.78rem;color:rgba(255,255,255,0.55);margin-top:4px;}
.brand-badge{position:absolute;top:12px;left:12px;z-index:3;background:rgba(0,0,0,0.75);border-left:2px solid var(--yellow);padding:4px 10px;font-size:0.65rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.85);}
.empty-state{display:none;text-align:center;padding:80px 20px;color:rgba(255,255,255,0.3);}
.work-cta{background:var(--yellow);padding:72px 40px;text-align:center;}
.work-cta h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3.5rem);color:var(--black);margin-bottom:12px;}
.work-cta p{color:rgba(0,0,0,0.65);font-size:1rem;margin-bottom:28px;max-width:500px;margin-left:auto;margin-right:auto;}
.btn-black{background:var(--black);color:#fff;padding:16px 40px;border-radius:4px;font-weight:800;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;display:inline-block;transition:opacity 0.2s;}
.btn-black:hover{opacity:0.85;}
.tagline-band{background:#000;padding:64px 40px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);}
.tagline-band .quote{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,4rem);color:#fff;letter-spacing:0.04em;line-height:1.1;}
.tagline-band .attr{margin-top:16px;font-size:0.8rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
footer{background:#050505;padding:64px 40px 32px;border-top:3px solid var(--yellow);}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;max-width:1400px;margin:0 auto 48px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,0.08);}
.footer-logo img{height:56px;width:auto;margin-bottom:16px;}
.footer-about{color:rgba(255,255,255,0.8);font-size:0.85rem;line-height:1.7;margin-bottom:20px;}
.footer-ci{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;color:#fff;font-size:0.85rem;}
.footer-ci strong{color:var(--yellow);min-width:80px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.fh{font-size:0.72rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--yellow);margin-bottom:20px;}
.fl{list-style:none;}
.fl li{margin-bottom:10px;}
.fl a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.fl a:hover{color:var(--yellow);}
.footer-bottom{max-width:1200px;margin:0 auto;padding-top:24px;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-bottom p{color:rgba(255,255,255,0.25);font-size:0.75rem;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:88vw;max-height:80vh;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:28px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;opacity:0.6;line-height:1;}
.lb-close:hover{opacity:1;}
.lb-cap strong{display:block;font-size:1rem;color:#fff;font-weight:800;text-align:center;}
.lb-cap span{display:block;font-size:0.82rem;color:rgba(255,255,255,0.45);margin-top:4px;text-align:center;}
#vox-overlay{display:none;position:fixed;bottom:90px;right:24px;width:340px;height:480px;background:#111;border:1px solid var(--yellow);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8);z-index:9999;}
#vox-overlay iframe{width:100%;height:100%;border:none;}
#vox-close-btn{position:absolute;top:8px;right:12px;background:none;border:none;color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;z-index:10;}
@media(max-width:768px){.feature-row{grid-template-columns:1fr;height:auto;}.feature-card{height:260px;}.gallery-grid{grid-template-columns:repeat(2,1fr);}}
