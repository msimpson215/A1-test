<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact & Free Estimate | A1 Professional Asphalt & Sealing LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--yellow:#F5C518;--black:#0A0A0A;--dark:#111111;--gray:#1E1E1E;--text:#FFFFFF;--muted:rgba(255,255,255,0.55);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}

/* NAV */








/* PAGE HEADER */
.page-header{padding:140px 40px 80px;background:#1a1a1a;position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:url('A1__asphalt_logo.jpeg') center/cover no-repeat;opacity:0.13;z-index:0;}
.page-header .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:0.72rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--yellow);margin-bottom:16px;}
.section-label::before{content:'';width:28px;height:2px;background:var(--yellow);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,6rem);line-height:1;color:#fff;}
.page-title span{color:var(--yellow);}

/* CONTACT GRID */
.contact-section{padding:80px 40px;background:#161616;}
.contact-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}

/* FORM */
.form-wrap{background:#1a1a1a;padding:48px;border-top:3px solid var(--yellow);}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;margin-bottom:8px;}
.form-subtitle{color:rgba(255,255,255,0.6);font-size:0.9rem;margin-bottom:32px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:0.75rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:8px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#242424;border:1px solid rgba(255,255,255,0.12);border-radius:3px;padding:14px 16px;color:#fff;font-family:'Barlow',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--yellow);}
.form-group select option{background:#111;}
.form-group textarea{min-height:130px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.btn-submit{width:100%;background:var(--yellow);color:var(--black);padding:18px;border:none;border-radius:3px;font-family:'Barlow',sans-serif;font-weight:900;font-size:0.95rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s,transform 0.2s;margin-top:8px;}
.btn-submit:hover{opacity:0.88;transform:translateY(-2px);}
.form-note{font-size:0.78rem;color:rgba(255,255,255,0.4);text-align:center;margin-top:14px;}

/* CONTACT INFO SIDE */
.contact-info{padding-top:8px;}
.info-block{margin-bottom:40px;}
.info-label{font-size:0.7rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px;}
.info-value{font-size:1.05rem;color:#fff;line-height:1.6;}
.info-value a{color:#fff;text-decoration:none;transition:color 0.2s;}
.info-value a:hover{color:var(--yellow);}
.office-card{background:var(--gray);padding:24px 28px;margin-bottom:3px;border-left:3px solid transparent;transition:border-color 0.2s;}
.office-card:hover{border-left-color:var(--yellow);}
.office-name{font-size:0.72rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px;}
.office-details{font-size:0.88rem;color:rgba(255,255,255,0.8);line-height:1.6;}
.tagline-cta{background:var(--yellow);color:var(--black);padding:28px 32px;margin-top:32px;text-align:center;}
.tagline-cta p{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.04em;}
.tagline-cta span{display:block;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;opacity:0.75;}

/* FOOTER */
footer{background:#050505;padding:64px 40px 32px;border-top:3px solid var(--yellow);}
.footer-logo img{height:56px;width:auto;margin-bottom:16px;}
.footer-about{color:rgba(255,255,255,0.8);font-size:0.85rem;line-height:1.7;margin-bottom:20px;}
.footer-contact-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;color:#fff;font-size:0.85rem;}
.footer-contact-item strong{color:var(--yellow);min-width:70px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.footer-heading{font-size:0.72rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--yellow);margin-bottom:20px;}
.footer-links{list-style:none;}
.footer-links li{margin-bottom:10px;}
.footer-links a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.footer-links a:hover{color:var(--yellow);}
.footer-bottom{max-width:1200px;margin:0 auto;padding-top:24px;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-bottom p{color:rgba(255,255,255,0.25);font-size:0.75rem;}
.footer-seo{color:rgba(255,255,255,0.15);font-size:0.72rem;}
/* VOX */
#vox-overlay{display:none;position:fixed;bottom:90px;right:24px;width:340px;height:480px;background:#111;border:1px solid var(--yellow);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8);z-index:9999;}
#vox-overlay.open{display:block;}
#vox-overlay iframe{width:100%;height:100%;border:none;}
#vox-close-btn{position:absolute;top:8px;right:12px;background:none;border:none;color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;z-index:10;}

/* SUCCESS STATE */
.form-success{display:none;text-align:center;padding:48px 24px;}
.form-success .check{font-size:3rem;color:var(--yellow);margin-bottom:16px;}
.form-success h3{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;margin-bottom:12px;}
.form-success p{color:rgba(255,255,255,0.7);font-size:0.95rem;line-height:1.6;}













function closeVox(){var o=document.getElementById('vox-overlay');o.style.display='none';o.classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVox();});
document.addEventListener('click',function(e){var o=document.getElementById('vox-overlay');if(o.style.display==='block'&&!o.contains(e.target)&&!e.target.closest('[onclick="openVox()"]')){closeVox();}});
</script>
