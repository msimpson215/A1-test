<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A1 Professional Asphalt & Sealing LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --yellow: #F5C518;
  --black: #0A0A0A;
  --dark: #111111;
  --gray: #1E1E1E;
  --text: #FFFFFF;
  --muted: rgba(255,255,255,0.55);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}

/* ── NAV ── */





.nav-cta{display:flex;align-items:center;gap:12px;}
.nav-phone{display:none;}

.btn-nav-call:hover{opacity:0.85;}


.btn-
.btn-nav:hover{opacity:0.85;}





.hero-bg{position:absolute;inset:0;background:url('Sams-Club-Parking-Lot-Painting-980x429.jpg') center/cover no-repeat;filter:brightness(0.6);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.65) 0%,rgba(0,0,0,0.2) 100%);}
.hero-stripe{position:absolute;bottom:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--yellow) 0px,var(--yellow) 60px,transparent 60px,transparent 90px);}
.hero-content{position:relative;z-index:2;width:100%;max-width:1200px;margin:0 auto;padding:0 40px;padding-top:72px;text-align:left;display:flex;flex-direction:column;align-items:flex-start;}.hero-tagline{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,11vw,10rem);color:#ffffff;line-height:0.9;letter-spacing:0.01em;margin-bottom:24px;text-align:left;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:transparent;color:#ffffff;font-size:0.9rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:20px;}.hero-badge::before{content:"";width:28px;height:2px;background:var(--yellow);}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,8vw,7rem);line-height:0.95;letter-spacing:0.02em;margin-bottom:24px;text-align:center;}
.hero h1 span{color:var(--yellow);}
.hero-sub{font-size:1.1rem;color:#ffffff;max-width:700px;line-height:1.6;margin-bottom:36px;text-align:left;}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:flex-start;}
.btn-primary{background:var(--yellow);color:var(--black);padding:16px 32px;border-radius:4px;font-weight:800;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;transition:transform 0.2s,opacity 0.2s;}
.btn-primary:hover{transform:translateY(-2px);opacity:0.9;}
.btn-outline{background:transparent;color:#fff;padding:16px 32px;border-radius:4px;font-weight:700;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;border:2px solid rgba(255,255,255,0.4);transition:border-color 0.2s,color 0.2s;}
.btn-outline:hover{border-color:var(--yellow);color:var(--yellow);}
.hero-stats{display:flex;gap:48px;margin-top:56px;padding-top:40px;border-top:1px solid rgba(255,255,255,0.12);justify-content:flex-start;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--yellow);line-height:1;}
.stat-label{font-size:0.78rem;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}

/* ── TICKER ── */
.ticker-label{background:var(--black);text-align:center;padding:10px;font-size:0.7rem;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--yellow);}
.ticker-wrap{background:var(--yellow);padding:16px 0;overflow:hidden;position:relative;}
.ticker-track{display:flex;align-items:center;width:max-content;animation:tickerMove 30s linear infinite;}
.ticker-item{display:inline-flex;align-items:center;margin-right:80px;flex-shrink:0;}
.ticker-item img{height:48px;width:auto;max-width:130px;object-fit:contain;opacity:0.85;}
.ticker-dot{width:5px;height:5px;background:var(--black);border-radius:50%;opacity:0.3;margin-right:80px;flex-shrink:0;}

/* ── SECTION SHARED ── */
.section{padding:96px 40px;}
.container{max-width:1200px;margin:0 auto;}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:0.72rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--yellow);margin-bottom:16px;}
.section-label::before{content:'';width:28px;height:2px;background:var(--yellow);}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,5vw,4rem);line-height:1.05;margin-bottom:24px;}
.section-title span{color:var(--yellow);}

/* ── SERVICES ── */
.services-section{background:var(--dark);position:relative;} .services-section::before{content:'';position:absolute;inset:0;background:url('A1__asphalt_logo.jpeg') center/cover no-repeat;opacity:0.06;z-index:0;} .services-section .container{position:relative;z-index:1;}
.services-intro{max-width:560px;margin-bottom:56px;}
.services-intro p{color:rgba(255,255,255,0.85);line-height:1.7;font-size:1rem;}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:32px;}
.service-card{background:var(--gray);padding:36px 28px;position:relative;overflow:hidden;transition:background 0.25s;text-decoration:none;display:block;}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow);transform:scaleX(0);transform-origin:left;transition:transform 0.3s;}
.service-card:hover{background:#252525;}
.service-card:hover::before{transform:scaleX(1);}
.service-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:rgba(245,197,24,0.15);line-height:1;margin-bottom:12px;}
.service-icon{font-size:1.8rem;margin-bottom:14px;}
.service-name{font-weight:800;font-size:1rem;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;color:#fff;}
.service-desc{font-size:0.85rem;color:#ffffff;line-height:1.6;}
.service-arrow{position:absolute;bottom:20px;right:20px;color:var(--yellow);font-size:1.1rem;opacity:0;transition:opacity 0.2s,transform 0.2s;}
.service-card:hover .service-arrow{opacity:1;transform:translateX(4px);}
/* Photo backgrounds on service cards */
.service-card.has-photo{background-size:cover;background-position:center;background-repeat:no-repeat;}
.service-card.has-photo::after{content:'';position:absolute;inset:0;background:rgba(10,10,10,0.5);z-index:0;transition:background 0.3s;}
.service-card.has-photo:hover::after{background:rgba(10,10,10,0.2);}
.service-card.has-photo .service-icon,.service-card.has-photo .service-name,.service-card.has-photo .service-desc,.service-card.has-photo .service-arrow{position:relative;z-index:1;}
.service-card.has-photo .service-num{position:relative;z-index:1;}

/* National GC Button */
.national-btn-wrap{margin:8px 0 0 0;}
.national-btn{display:block;width:100%;background:linear-gradient(90deg,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.6) 100%),url('A1__asphalt_logo.jpeg') center/cover no-repeat;border:2px solid var(--yellow);color:var(--yellow);text-align:center;padding:22px 40px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.12em;text-decoration:none;text-transform:uppercase;transition:background 0.25s,color 0.25s;position:relative;overflow:hidden;}
.national-btn::after{content:'→';position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:1.4rem;transition:transform 0.2s;}
.national-btn:hover{background:var(--yellow);color:var(--black);}
.national-btn:hover::after{transform:translateY(-50%) translateX(6px);}

/* ── CREDIBILITY ── */
.cred-section{background:var(--black);padding:72px 40px;}
.cred-logos{display:flex;flex-wrap:wrap;gap:0;margin-top:48px;border:1px solid rgba(255,255,255,0.06);}
.cred-logo{flex:1;min-width:160px;padding:32px 24px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);transition:background 0.2s;}
.cred-logo:hover{background:rgba(245,197,24,0.05);}
.cred-logo span{font-weight:800;font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);transition:color 0.2s;}
.cred-logo:hover span{color:var(--yellow);}

/* ── PHOTO STRIP ── */
.photo-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;height:360px;}
.photo-strip-item{position:relative;overflow:hidden;}
.photo-strip-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.photo-strip-item:hover img{transform:scale(1.05);}
.photo-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:20px 16px 14px;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--yellow);}

/* ── MAP SECTION ── */
.map-section{background:var(--dark);padding:80px 40px;}
.map-section:hover .map-flag-overlay{background:rgba(0,0,0,0.58);transition:background 0.4s;}
.map-flag-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.72);transition:background 0.4s;}
.map-placeholder{margin-top:40px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:4px;height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.map-placeholder .map-icon{font-size:3rem;opacity:0.3;}
.map-placeholder p{color:rgba(255,255,255,0.85);font-size:0.9rem;letter-spacing:0.06em;text-transform:uppercase;}
.map-placeholder .map-badge{background:var(--yellow);color:var(--black);font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border-radius:2px;}
/* Video/Joe section flag */
.video-section{background:var(--black);padding:96px 40px;position:relative;overflow:hidden;}
.video-section::before{content:'';position:absolute;inset:0;background:url('images/unitedstatesflag.jpg') center/cover no-repeat;filter:brightness(0.38);z-index:0;}
.video-section .container{position:relative;z-index:1;}

/* ── REVIEWS ── */
.reviews-section{background:var(--black);padding:96px 40px;position:relative;} .reviews-section::before{content:'';position:absolute;inset:0;background:url('A1__asphalt_logo.jpeg') center/cover no-repeat;opacity:0.06;z-index:0;} .reviews-section .container{position:relative;z-index:1;}
.stars-header{display:flex;align-items:center;gap:20px;margin-bottom:48px;}
.big-stars{font-size:1.8rem;color:var(--yellow);letter-spacing:2px;}
.big-score{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--yellow);line-height:1;}
.score-label{font-size:0.8rem;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.08em;}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.review-card{background:var(--gray);padding:32px 28px;}
.review-stars{color:var(--yellow);font-size:1rem;letter-spacing:2px;margin-bottom:16px;}
.review-text{color:rgba(255,255,255,0.95);font-size:0.9rem;line-height:1.7;margin-bottom:20px;font-style:italic;}
.review-author{font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--yellow);}

/* ── PODCAST ── */
.podcast-section{background:var(--dark);padding:80px 40px;position:relative;} .podcast-section::before{content:'';position:absolute;inset:0;background:url('A1__asphalt_logo.jpeg') center/cover no-repeat;opacity:0.06;z-index:0;} .podcast-section .container{position:relative;z-index:1;}
.podcast-inner{display:flex;align-items:center;gap:64px;}
.podcast-text{flex:1;}
.podcast-player{flex:1;background:var(--gray);border-radius:8px;padding:32px;border:1px solid rgba(255,255,255,0.08);}
.podcast-btn{display:flex;align-items:center;gap:20px;background:var(--yellow);color:var(--black);padding:20px 28px;border-radius:6px;text-decoration:none;margin-top:28px;transition:transform 0.2s,opacity 0.2s;}
.podcast-btn:hover{transform:translateY(-2px);opacity:0.9;}
.podcast-icon{font-size:2rem;}
.podcast-btn-text strong{display:block;font-size:0.95rem;font-weight:800;letter-spacing:0.04em;}
.podcast-btn-text span{font-size:0.8rem;opacity:0.7;}
.audio-placeholder{text-align:center;padding:20px 0;}
.audio-placeholder .play-circle{width:64px;height:64px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.4rem;color:var(--black);}
.audio-placeholder p{color:rgba(255,255,255,0.85);font-size:0.85rem;}

/* ── VIDEO ── */
.video-section{background:var(--black);padding:96px 40px;position:relative;overflow:hidden;}
.video-wrap{margin-top:40px;background:var(--gray);border-radius:4px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);}
.play-btn{width:72px;height:72px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--black);cursor:pointer;transition:transform 0.2s;}
.play-btn:hover{transform:scale(1.08);}

/* ── AI SECTION ── */
.ai-section{background:#1a1a1a;padding:96px 40px;}
.ai-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.ai-text p{color:rgba(255,255,255,0.85);line-height:1.75;font-size:1rem;margin-bottom:16px;}
.ai-orb-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;}
.ai-orb{width:200px;height:200px;border-radius:50%;background:url('A1__asphalt_logo.jpeg') center center/contain no-repeat;background-color:#F5C518;box-shadow:0 0 60px rgba(245,197,24,0.4),0 0 120px rgba(245,197,24,0.15);animation:pulse 3s ease-in-out infinite;cursor:pointer;}
@keyframes tickerMove{0%{transform:translateX(0);}100%{transform:translateX(-50%);}} @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(245,197,24,0.4),0 0 120px rgba(245,197,24,0.15);}50%{transform:scale(1.06);box-shadow:0 0 80px rgba(245,197,24,0.6),0 0 160px rgba(245,197,24,0.25);}}
.orb-label{font-size:0.8rem;color:#555;text-align:center;letter-spacing:0.08em;text-transform:uppercase;}

/* ── CTA ── */
.cta-section{background:#0a0a0a;padding:80px 40px;text-align:center;border-top:3px solid var(--yellow);}
.cta-section h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4.5rem);color:var(--yellow);margin-bottom:16px;}
.cta-section p{color:rgba(255,255,255,0.85);font-size:1.1rem;margin-bottom:36px;}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn-dark{background:var(--black);color:#fff;padding:16px 36px;border-radius:4px;font-weight:800;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;transition:opacity 0.2s;}
.btn-dark:hover{opacity:0.85;}
.btn-dark-outline{background:var(--black);color:#ffffff;padding:16px 36px;border-radius:4px;font-weight:800;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;border:2px solid var(--black);transition:background 0.2s,color 0.2s;}
.btn-dark-outline:hover{background:var(--black);color:#fff;}

/* ── FOOTER ── */
footer{background:#050505;padding:64px 40px 32px;border-top:3px solid var(--yellow);}
.footer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:48px;max-width:1400px;margin:0 auto 48px;}.footer-address-row{max-width:1400px;margin:0 auto 40px;padding-bottom:32px;border-bottom:1px solid rgba(255,255,255,0.08);display:grid;grid-template-columns:repeat(4,1fr);gap:32px;}
.footer-logo img{height:56px;width:auto;margin-bottom:16px;}
.footer-about{color:rgba(255,255,255,0.8);font-size:0.85rem;line-height:1.7;margin-bottom:20px;}
.footer-contact-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;color:#ffffff;font-size:0.85rem;}
.footer-contact-item strong{color:var(--yellow);min-width:80px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.footer-hq-label{font-size:0.68rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--yellow);margin:16px 0 8px;}
.footer-sat-label{font-size:0.68rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:#ffffff;margin:14px 0 8px;}
.footer-sat-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;color:#ffffff;font-size:0.82rem;}
.footer-sat-item strong{color:var(--yellow);min-width:80px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.footer-heading{font-size:0.72rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--yellow);margin-bottom:20px;}
.footer-links{list-style:none;}
.footer-links li{margin-bottom:10px;}
.footer-links a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.footer-links a:hover{color:var(--yellow);}
.footer-bottom{max-width:1200px;margin:0 auto;padding-top:24px;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-bottom p{color:rgba(255,255,255,0.25);font-size:0.75rem;}
.footer-seo{color:rgba(255,255,255,0.18);font-size:0.72rem;}

/* ── VOX TALK OVERLAY ── */
#vox-overlay{display:none;position:fixed;bottom:90px;right:24px;width:340px;height:480px;background:#111;border:1px solid var(--yellow);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8);z-index:9999;}
#vox-overlay.open{display:block;animation:voxIn 0.25s ease forwards;}
@keyframes voxIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
#vox-overlay iframe{width:100%;height:100%;border:none;}
#vox-close-btn{position:absolute;top:8px;right:12px;background:none;border:none;color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;z-index:10;line-height:1;}

/* NAV height fix */


.btn-nav-call:hover{opacity:0.85;}















function closeVox(){var o=document.getElementById('vox-overlay');o.style.display='none';o.classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVox();});
document.addEventListener('click',function(e){var o=document.getElementById('vox-overlay');if(o.style.display==='block'&&!o.contains(e.target)&&!e.target.closest('[onclick="openVox()"]')){closeVox();}});
</script>
